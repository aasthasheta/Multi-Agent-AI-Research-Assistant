services:
  api:
    build: .
    container_name: research-assistant-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./chroma_db:/app/chroma_db
    restart: unless-stopped

  ui:
    build: .
    container_name: research-assistant-ui
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped
